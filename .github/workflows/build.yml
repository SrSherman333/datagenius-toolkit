name: Generate Executables
on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install libraries
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Create the binary (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: pyinstaller --onefile --windowed --name "DataGenius_Toolkit" --icon="docs/images/icon.png" --add-data "docs/images:docs/images" --hidden-import "PIL._tkinter_finder" --collect-all "customtkinter" src/gui/main_gui.py

      - name: Create the .exe (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --onefile --windowed --name "DataGenius_Toolkit" --icon="docs/images/icon.ico" --add-data "docs/images;docs/images" --hidden-import "PIL._tkinter_finder" --collect-all "customtkinter" src/gui/main_gui.py

      - name: Save files
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ matrix.os }}
          path: dist/
